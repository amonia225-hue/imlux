name: app
description: "PROJET IM'LUX - Espace souscripteur"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Réseau & état
  http: ^1.2.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2

  # UI & formatage
  google_fonts: ^6.2.1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1

  # Notifications push (activées une fois Firebase configuré)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpeg
